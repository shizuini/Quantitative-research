<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HopeLab 募捐偏好实验</title>
<style>
  body {
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(to bottom, #eef9ff, #87cefa);
    margin: 0; padding: 0;
  }
  .container {
    max-width: 900px; margin: 30px auto; padding: 20px; background: rgba(255,255,255,0.9); border-radius: 15px;
  }
  h1 { font-size: 28px; font-weight: bold; margin-bottom: 15px; }
  .info { margin-bottom: 20px; color: #6f8fa6; }
  .amounts button {
    margin: 5px; padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer;
  }
  .amounts button.selected { background-color: #87cefa; color: white; }
  .amounts button:not(.selected) { background-color: #eeeeee; }
  input[type=number] { padding: 8px; width: 150px; margin-right: 10px; }
  .progress-bar { width: 100%; height: 25px; background: #eeeeee; border-radius: 12px; margin: 10px 0; }
  .progress-fill { height: 100%; background: #87cefa; border-radius: 12px; width: 0%; text-align: center; color: white; line-height: 25px; }
  .confirm { margin-top: 20px; padding: 12px 25px; border-radius: 12px; border:none; background:#87cefa; color:white; cursor:pointer; font-size:16px;}
  .display-choice button { margin-right:10px; padding:8px 15px; border-radius:8px; border:none; cursor:pointer; }
  .display-choice button.selected { background-color:#87cefa; color:white; }
</style>
</head>
<body>
<div class="container">
  <h1>HopeLab 募捐偏好实验平台</h1>
  <div class="info">本页面为模拟实验页面，不会真实收款</div>
  
  <div class="amounts">
    <div>请选择模拟捐赠金额：</div>
    <button data-value="50">支持 ¥50</button>
    <button data-value="100">支持 ¥100</button>
    <button data-value="200">支持 ¥200</button>
    <button data-value="500">支持 ¥500</button>
    <div>
      <input type="number" placeholder="自定义金额">
      <button id="custom">使用自定义金额</button>
    </div>
  </div>
  
  <div class="display-choice">
    <div>隐私选择：</div>
    <button data-value="anonymous">匿名捐赠</button>
    <button data-value="name">只显示姓名</button>
    <button data-value="name_amount">显示姓名和金额</button>
  </div>
  
  <div class="progress-bar"><div class="progress-fill">0%</div></div>
  <button class="confirm">确认模拟捐赠</button>
  
  <div style="margin-top:20px;">
    <a id="download" href="#" download="donation_data.csv">下载CSV数据</a>
  </div>
</div>

<script>
  // 随机分组
  const conditions = ['A','B','C','D'];
  const condition = conditions[Math.floor(Math.random()*conditions.length)];
  console.log("Assigned condition:", condition);

  let selectedAmount = null;
  let display = 'anonymous';
  const data = [];

  // 金额按钮
  document.querySelectorAll('.amounts button[data-value]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.amounts button').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAmount = btn.getAttribute('data-value');
    });
  });

  document.getElementById('custom').addEventListener('click',()=>{
    const val = document.querySelector('.amounts input[type=number]').value;
    if(val) selectedAmount = val;
    document.querySelectorAll('.amounts button').forEach(b=>b.classList.remove('selected'));
  });

  // 隐私选择
  document.querySelectorAll('.display-choice button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.display-choice button').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      display = btn.getAttribute('data-value');
    });
  });

  // 模拟点击
  document.querySelector('.confirm').addEventListener('click',()=>{
    if(!selectedAmount) { alert('请选择金额'); return; }
    const timestamp = new Date().toISOString();
    data.push({condition,amount:selectedAmount,display,timestamp});
    
    // 更新进度条
    const fill = document.querySelector('.progress-fill');
    let current = parseInt(fill.style.width) || 0;
    current += Math.min(10, 100-current);
    fill.style.width = current+'%';
    fill.textContent = current+'%';
  });

  // 下载 CSV
  document.getElementById('download').addEventListener('click',()=>{
    let csv = 'condition,amount,display,timestamp\n';
    data.forEach(d=>{
      csv += `${d.condition},${d.amount},${d.display},${d.timestamp}\n`;
    });
    const blob = new Blob([csv], {type:'text/csv'});
    document.getElementById('download').href = URL.createObjectURL(blob);
  });
</script>
</body>
</html>
